services:
  db:
    image: postgres:16
    container_name: idle-quest-db
    environment:
      POSTGRES_USER: "idlequest"
      POSTGRES_PASSWORD: "test"
      POSTGRES_DB: "game"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: idle-quest-backend
    ports:
      - "3000:3000"
      - "5555:5555"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && (npx prisma studio --browser none --port 5555 & npm run dev)"

  web:
    build: ./frontend
    container_name: idle-quest-frontend
    ports:
      - "80:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

  moderation:
    build: ./microservices/chatAI
    container_name: idle-quest-moderation
    ports:
      - "5000:5000"
    volumes:
      - ./microservices/chatAI:/app

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
